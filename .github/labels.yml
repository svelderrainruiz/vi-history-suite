- name: feature:not-implemented
  color: "B60205"
  description: Selectable path returned a not-yet-implemented runtime code.
- name: error-code
  color: "C5DEF5"
  description: Report includes a stable VIHS_E runtime error code.
- name: proof:packet-attached
  color: "BFD4F2"
  description: Report includes or references a vihs-validation-proof packet.
- name: version:1.3.13
  color: "F9D0C4"
  description: Report targets the v1.3.13 public validation pre-release.
- name: windows-labview
  color: "1D76DB"
  description: Windows host or Docker Desktop Windows-container LabVIEW report.
- name: proof:reported
  color: "FBCA04"
  description: User evidence received but not maintainer-reproduced.
- name: proof:reproduced
  color: "0E8A16"
  description: Maintainer reproduced or retained the reported path.
- name: proof:deferred
  color: "D93F0B"
