- name: community-validation
  color: "0E8A16"
  description: User-submitted Marketplace pre-release validation evidence.
- name: marketplace-preview
  color: "5319E7"
  description: Report specific to the VS Code Marketplace pre-release channel.
- name: validation:success
  color: "0E8A16"
  description: User reports a selected provider/year/bitness path worked.
- name: validation:failure
  color: "D93F0B"
