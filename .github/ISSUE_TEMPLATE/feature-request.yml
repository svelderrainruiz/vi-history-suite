name: Feature request
description: Request an install, configuration, validation, or compare improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Keep requests bounded to the public installed-user surface and public documentation.
  - type: textarea
    id: user_goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: dropdown
    id: affected_surface
    attributes:
      label: Which surface should improve?
      options:
        - Install bootstrap
        - `vihs`
        - `vihs --validate`
        - Compare preflight or compare execution
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: affected_versions
    attributes:
      label: Affected provider, LabVIEW year, or bitness
      description: Include the exact combinations that matter if known
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround or fallback
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
