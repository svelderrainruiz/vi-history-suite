name: Feature request
description: Request a public-product enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests bounded to the public product surface: Docker-only compare workflow, public docs, and public development path.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
