name: Bug report
description: Report an install, settings, validation, or compare problem
title: "[Bug]: "
labels:
  - bug
  - community-validation
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this template for public installed-user issues only. Do not include private GitLab control-plane material.
        Before filing, keep the exact `vihs --validate` output and the command or UI step that failed.

        For Marketplace pre-release `1.3.10`, selectable does not mean maintainer-proven. Include provider, LabVIEW year, bitness, and validation output so the proof status can be triaged.
  - type: dropdown
    id: install_route
    attributes:
      label: Install route
      options:
        - VS Code Extensions view
        - VS Code Extensions view pre-release channel
        - `code --install-extension svelderrainruiz.vi-history-suite`
        - `code --install-extension svelderrainruiz.vi-history-suite@prerelease`
        - Exact released Marketplace line (`1.3.9`)
        - Marketplace community-validation pre-release (`1.3.10`)
        - Preview VSIX or other non-Marketplace package
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      description: Example `1.3.0`, `1.3.1`, or preview VSIX version
    validations:
      required: true
  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      description: Output from `code --version`
    validations:
      required: true
  - type: input
    id: windows_and_powershell
    attributes:
      label: Windows and PowerShell version
      description: Example Windows 11 24H2, PowerShell 7.5
    validations:
      required: true
  - type: dropdown
    id: failing_surface
    attributes:
      label: What command or surface failed?
      options:
        - Install bootstrap
        - `vihs`
        - `vihs --validate`
        - `VI History` compare preflight
        - `Compare`
        - Other
    validations:
      required: true
  - type: dropdown
    id: workspace_trusted
    attributes:
      label: Was the VS Code workspace trusted?
      options:
        - "Yes"
        - "No"
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Selected provider
      options:
        - host
        - docker
        - Not sure
    validations:
      required: true
  - type: input
    id: labview_year
    attributes:
      label: Selected LabVIEW year
      description: Example `2026`
  - type: dropdown
    id: bitness
    attributes:
      label: Selected bitness
      options:
        - x64
        - x86
        - Not sure
  - type: textarea
    id: validate_output
    attributes:
      label: `vihs --validate` output
      description: Paste the exact output, or say that you could not run it
    validations:
      required: true
  - type: input
    id: docker_details
    attributes:
      label: Docker details if relevant
      description: Example `docker version` and `docker info --format '{{.OSType}}'`
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the exact command, setting change, or compare step that reproduces the problem
    validations:
      required: true
