name: Validation success
description: Report a working v1.3.11 pre-release provider/year/bitness path
title: "[Validation success]: "
labels:
  - community-validation
  - marketplace-preview
  - validation:success
  - proof:reported
  - proof:packet-attached
  - version:1.3.11
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this template when Marketplace pre-release `1.3.11` worked for a selected provider, LabVIEW year, and bitness.

        Run `vihs --validate --proof-out ./vihs-proof` when possible and attach or paste facts from `vihs-validation-proof.json`.
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      value: "1.3.11"
    validations:
      required: true
  - type: textarea
    id: code_version
    attributes:
      label: VS Code version
      description: Paste `code --version`.
    validations:
      required: true
  - type: input
    id: operating_system
    attributes:
      label: Operating system
      description: Example Windows 11 24H2 or Ubuntu 25.10.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Selected provider
      options:
        - host
        - docker
    validations:
      required: true
  - type: input
    id: labview_year
    attributes:
      label: Selected LabVIEW year
    validations:
      required: true
  - type: dropdown
    id: bitness
    attributes:
      label: Selected bitness
      options:
        - x64
        - x86
    validations:
      required: true
  - type: textarea
    id: validate_output
    attributes:
      label: Validation output or proof packet
      description: Paste `vihs --validate` output including `runtimeErrorCode=VIHS_OK`, or attach/name `vihs-validation-proof.json`.
    validations:
      required: true
  - type: textarea
    id: compare_result
    attributes:
      label: Compare result
      description: Say whether compare preflight and compare execution completed.
    validations:
      required: true
  - type: textarea
    id: environment_notes
    attributes:
      label: Environment notes
      description: Include Docker details, LabVIEW install paths, or other facts that helped the path work.
