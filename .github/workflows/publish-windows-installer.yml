name: Publish Public Release Kit

on:
  workflow_dispatch:
    inputs:
      publish_legacy_installer:
        description: "Also build and publish the legacy NSIS installer wrapper"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      VI_HISTORY_SUITE_GITLAB_API_TOKEN: ${{ secrets.VI_HISTORY_SUITE_GITLAB_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release secret
        shell: pwsh
        run: |
          if (-not $env:VI_HISTORY_SUITE_GITLAB_API_TOKEN) {
            throw "Repository secret VI_HISTORY_SUITE_GITLAB_API_TOKEN is required."
          }

      - name: Sync immutable release evidence
        shell: pwsh
        run: ./scripts/Sync-ImmutableReleaseEvidence.ps1

      - name: Sync pinned fixture bundle
        shell: pwsh
        run: ./scripts/Sync-PinnedFixtureBundle.ps1

      - name: Build public setup assets
        shell: pwsh
        run: ./scripts/Build-PublicSetupAssets.ps1

      - name: Validate public facade scaffold
        shell: pwsh
        run: ./scripts/Validate-PublicFacadeScaffold.ps1

      - name: Smoke test public setup fixture bootstrap
        shell: pwsh
        run: ./scripts/Test-PublicSetupFixture.ps1

      - name: Install NSIS 3.11 on runner
        if: ${{ inputs.publish_legacy_installer }}
        shell: pwsh
        run: |
          if (-not (Get-Command choco.exe -ErrorAction SilentlyContinue)) {
            throw "Chocolatey is required on the Windows runner to install NSIS 3.11."
          }
          choco install nsis --version=3.11 -y --allow-downgrade --no-progress

      - name: Fetch pinned bootstrap inputs
        if: ${{ inputs.publish_legacy_installer }}
        shell: pwsh
        run: ./docker/windows-installer-builder/Fetch-WorkflowBootstrapInputs.ps1

      - name: Test harness bootstrap regression guards
        if: ${{ inputs.publish_legacy_installer }}
        shell: pwsh
        run: ./scripts/Test-HarnessBootstrapRegression.ps1

      - name: Smoke test harness fixture bootstrap
        if: ${{ inputs.publish_legacy_installer }}
        shell: pwsh
        run: ./scripts/Test-HarnessFixtureBootstrap.ps1

      - name: Build legacy Windows installer
        if: ${{ inputs.publish_legacy_installer }}
        shell: pwsh
        run: ./docker/windows-installer-builder/Invoke-InstallerBuild.ps1

      - name: Publish release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $legacyInstallerEnabled = '${{ inputs.publish_legacy_installer }}' -eq 'true'
          $publicManifest = Get-Content -LiteralPath "releases/v0.2.0/public-setup-manifest.json" -Raw | ConvertFrom-Json
          $releaseContract = Get-Content -LiteralPath "releases/v0.2.0/release-ingestion.json" -Raw | ConvertFrom-Json

          $tag = $publicManifest.release.tag
          $version = $publicManifest.release.version
          $notesPath = "artifacts/public-setup/github-release-notes.md"
          $vsixPath = "releases/v0.2.0/release-evidence/vi-history-suite-$version.vsix"
          $vsixChecksumPath = "releases/v0.2.0/release-evidence/vi-history-suite-$version.vsix.sha256"
          $releaseManifestPath = "releases/v0.2.0/release-evidence/release-manifest.json"
          $releaseRecordPath = "releases/v0.2.0/release-evidence/release-record.md"
          $publicSetupAssetRoot = "artifacts/public-setup"

          $notes = @(
            "# VI History Suite $tag",
            "",
            "- Exact VSIX: vi-history-suite-$version.vsix",
            "- Primary public setup surface: release kit manifest plus Windows and Linux setup adapters.",
            "- Pinned labview-icon-editor fixture bundle is published for reproducible review setup.",
            "- Host-machine setup and acceptance are now the primary public proof path."
          )

          if ($legacyInstallerEnabled) {
            $notes += "- Legacy NSIS installer wrapper also published for compatibility."
          }

          $notes | Set-Content -LiteralPath $notesPath -Encoding ASCII

          $assets = @(
            $vsixPath,
            $vsixChecksumPath,
            $releaseManifestPath,
            $releaseRecordPath,
            "$publicSetupAssetRoot/public-setup-manifest.json",
            "$publicSetupAssetRoot/labview-icon-editor.manifest.json",
            "$publicSetupAssetRoot/labview-icon-editor-develop-e8945de7.bundle",
            "$publicSetupAssetRoot/labview-icon-editor-develop-e8945de7.json",
            "$publicSetupAssetRoot/setup/windows/Setup-VIHistorySuite.ps1",
            "$publicSetupAssetRoot/setup/linux/setup-vi-history-suite.sh",
            "$publicSetupAssetRoot/SHA256SUMS-public-setup.txt"
          )

          if ($legacyInstallerEnabled) {
            $assets += @(
              $releaseContract.builderContract.installerBuild.defaultOutputRelativePath,
              "artifacts/windows-installer/SHA256SUMS.txt",
              $releaseContract.builderContract.installerBuild.defaultBuildMetadataRelativePath
            )
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY --title "VI History Suite $tag" --notes-file $notesPath --target $env:GITHUB_SHA
          } else {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "VI History Suite $tag" --notes-file $notesPath
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-release-kit-v0.2.0
          path: |
            artifacts/public-setup/
            artifacts/windows-installer/
            releases/v0.2.0/release-evidence/vi-history-suite-0.2.0.vsix
            releases/v0.2.0/release-evidence/vi-history-suite-0.2.0.vsix.sha256
            releases/v0.2.0/release-evidence/release-manifest.json
            releases/v0.2.0/release-evidence/release-record.md
