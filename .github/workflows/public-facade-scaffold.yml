name: Public Facade Scaffold

on:
  pull_request:
    paths:
      - ".github/workflows/public-facade-scaffold.yml"
      - ".github/workflows/publish-windows-installer.yml"
      - "README.md"
      - "INSTALL.md"
      - "SUPPORT.md"
      - "releases/**"
      - "installer/**"
      - "docker/**"
      - "acceptance/**"
      - "fixtures/**"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/public-facade-scaffold.yml"
      - ".github/workflows/publish-windows-installer.yml"
      - "README.md"
      - "INSTALL.md"
      - "SUPPORT.md"
      - "releases/**"
      - "installer/**"
      - "docker/**"
      - "acceptance/**"
      - "fixtures/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public facade scaffold
        shell: pwsh
        run: ./scripts/Validate-PublicFacadeScaffold.ps1
